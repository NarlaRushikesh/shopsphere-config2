# ========================
# SERVER
# ========================
server.port=8084
spring.application.name=admin-service

# ========================
# DATABASE (use separate DB or same DB with different schema)
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/admin_db
spring.datasource.username=root
spring.datasource.password=Rushi@12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ========================
# EUREKA
# ========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ========================
# SWAGGER
# ========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Zipkin server URL
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Sampling rate — 1.0 means 100% of requests are traced (use 0.1 in production)
management.tracing.sampling.probability=1.0

# Show trace/span IDs in logs
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
